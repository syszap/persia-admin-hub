services:
  postgres:
    image: postgres:16-alpine
    container_name: persia_postgres
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-persia_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: persia_app
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "58000:58000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  pgbackups:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: persia_pgbackups
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_HOST: postgres
      SCHEDULE: "0 */6 * * *"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - pg_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

volumes:
  pg_data:
  pg_backups:

networks:
  app_network:
    driver: bridge
